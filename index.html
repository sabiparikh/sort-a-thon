<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sort-a-thon</title>
<style>
body{margin:0;font-family:Arial;background:#cfe8ff}
h1{text-align:center;font-size:46px;margin-top:70px}
button{cursor:pointer}
#customBtn{position:fixed;top:20px;right:20px;font-size:20px;padding:10px 18px}
#pauseBtn{position:fixed;top:20px;left:20px;font-size:20px;padding:10px 18px}
#panel{position:fixed;right:-420px;top:0;width:420px;height:100%;background:#fff;transition:.4s;padding:20px;overflow:auto;box-shadow:-4px 0 10px rgba(0,0,0,.2)}
.progressWrap{width:80%;margin:auto}
.progress{height:26px;background:#eee;border-radius:20px;margin-bottom:12px}
.bar{height:100%;width:0;background:#4caf50;border-radius:20px}
.container{display:flex;justify-content:center;gap:40px;margin-top:20px}
.bucket{width:220px;min-height:200px;background:#fff;border:3px dashed #444;border-radius:12px;padding:10px}
.option{background:#fff;border:2px solid #333;border-radius:10px;padding:8px;margin:6px;display:inline-block}
.grey{background:#bbb!important}
#optionsBox{text-align:center;margin-top:20px}
#playAgain{display:block;margin:30px auto;font-size:30px;padding:12px 30px}
</style>
</head>
<body>
<button id="pauseBtn">Pause Game</button>
<button id="customBtn">Customize Game</button>
<div id="panel">
<h2>Customize Game</h2>
Robot 1 speed <input id="r1speed" type="range" min="1" max="6" value="3"><br><br>
Robot 2 speed <input id="r2speed" type="range" min="1" max="6" value="3"><br><br>
<h3>Create Custom Question</h3>
<input id="custQ" placeholder="Question"><br>
<input id="custOpt" placeholder="Options comma separated"><br>
<input id="custBuckets" placeholder="Buckets comma separated"><br>
<button onclick="applyCustom()">Apply</button>
<button onclick="closePanel()">Cancel</button>
</div>
<h1 id="levelTitle"></h1>
<div class="progressWrap">
Robot 1<div class="progress"><div id="r1bar" class="bar"></div></div>
Robot 2<div class="progress"><div id="r2bar" class="bar"></div></div>
You<div class="progress"><div id="youbar" class="bar"></div></div>
</div>
<div class="container" id="bucketArea"></div>
<div id="optionsBox"></div>
<button id="playAgain" onclick="location.reload()">Play Again</button>
<script>
let paused=false,current=0,youProg=0,r1Prog=0,r2Prog=0;
let questions=[
{level:'Level 1 - Easy',options:['Snakes','Crocodiles','Frogs','Newts','Lizards','Salamanders'],buckets:['Reptiles','Amphibians'],answers:{Reptiles:['Snakes','Crocodiles','Lizards'],Amphibians:['Frogs','Newts','Salamanders']}},
{level:'Level 1 - Easy',options:['3','6','6','9','3000','15111','18','18','3000'],buckets:['Multiples of 2','Multiples of 3'],answers:{'Multiples of 2':['6','6','18','18','3000','3000'],'Multiples of 3':['3','6','6','9','18','18','3000','3000','15111']}},
{level:'Level 1 - Easy',options:['Myna','Pond Heron','Indian Robin','Red Whiskered Bulbul','Cattle Egret','Common Iora'],buckets:['Small birds','Large birds'],answers:{'Small birds':['Indian Robin','Common Iora','Red Whiskered Bulbul','Myna'],'Large birds':['Pond Heron','Cattle Egret']}},
{level:'Level 2 - Medium',options:['Chrysanthemum','Ashoka','Tomato','Mango','Money plant','Aloevera'],buckets:['Flowering plants','Non - flowering plants','Fruit plants'],answers:{'Flowering plants':['Chrysanthemum'], 'Non - flowering plants':['Money plant','Aloevera'], 'Fruit plants':['Tomato','Mango']}},
{level:'Level 2 - Medium',options:['Chess','Battleship','Cricket','Javelin throwing','Scrabble','Badminton','Football'],buckets:['Indoor games','Outdoor games'],answers:{'Indoor games':['Chess','Battleship','Scrabble'],'Outdoor games':['Cricket','Javelin throwing','Badminton','Football']}},
{level:'Level 2 - Medium',options:['2','4','3','5','7','21','18','11'],buckets:['Prime Numbers','Composite Numbers'],answers:{'Prime Numbers':['2','3','5','7','11'],'Composite Numbers':['4','21','18']}},
{level:'Level 3 - Hard',options:['Rubber','Plastic','Paper','Wood','Metal','Fibre','Paper Mache'],buckets:['Strong Material','Weak Material'],answers:{'Strong Material':['Metal','Wood'],'Weak Material':['Rubber','Plastic','Paper','Fibre','Paper Mache']}},
{level:'Level 3 - Hard',options:['A','C','E','I','O','U','D','F','G','V','W'],buckets:['Vowels','Consonants'],answers:{Vowels:['A','E','I','O','U'],Consonants:['C','D','F','G','V','W']}},
{level:'Level 3 - Hard',options:['Laptop','Phone','Paper bird','Pillow','Show pieces'],buckets:['Useful things','Un - useful things'],answers:{'Useful things':['Laptop','Phone','Pillow'],'Un - useful things':['Paper bird','Show pieces']}}
];
questions.sort(()=>Math.random()-0.5);
function loadQ(){
let q=questions[current];
document.getElementById('levelTitle').innerText=q.level;
let area=document.getElementById('bucketArea');area.innerHTML='';
q.buckets.forEach(b=>{
let d=document.createElement('div');d.className='bucket';d.innerHTML='<b>'+b+'</b>';d.ondragover=e=>e.preventDefault();
d.ondrop=e=>drop(e,b);area.appendChild(d);
});
let opt=document.getElementById('optionsBox');opt.innerHTML='';
q.options.forEach(o=>{
let div=document.createElement('div');div.className='option';div.innerText=o;div.draggable=true;
div.ondragstart=e=>e.dataTransfer.setData('text',o);
opt.appendChild(div);
});}
function drop(e,bucket){let item=e.dataTransfer.getData('text');let q=questions[current];
if(q.answers[bucket] && q.answers[bucket].includes(item)){
youProg+=100/q.options.length;document.getElementById('youbar').style.width=youProg+'%';
e.target.innerHTML+= '<div>'+item+'</div>';
document.querySelectorAll('.option').forEach(o=>{if(o.innerText==item)o.classList.add('grey')});
confetti();
if(document.querySelectorAll('.grey').length==q.options.length){current++;if(current>=questions.length){alert('Champion! You win a trophy 🏆');}else{youProg=0;loadQ();}}
}else{alert('Wrong! Game Over');location.reload();}}
function robots(){setInterval(()=>{if(!paused){r1Prog+=document.getElementById('r1speed').value*0.7;r2Prog+=document.getElementById('r2speed').value*0.7;
document.getElementById('r1bar').style.width=r1Prog+'%';document.getElementById('r2bar').style.width=r2Prog+'%';}},1000);} 
function confetti(){for(let i=0;i<30;i++){let s=document.createElement('div');s.innerText='⭐';s.style.position='fixed';s.style.left=Math.random()*100+'%';s.style.top='0';s.style.fontSize='26px';document.body.appendChild(s);setTimeout(()=>s.remove(),2000)}}
document.getElementById('pauseBtn').onclick=()=>paused=!paused;
document.getElementById('customBtn').onclick=()=>document.getElementById('panel').style.right='0';
function closePanel(){document.getElementById('panel').style.right='-420px'}
function applyCustom(){let q=document.getElementById('custQ').value;
let o=document.getElementById('custOpt').value.split(',');
let b=document.getElementById('custBuckets').value.split(',');
questions=[{level:'Custom Level',options:o,buckets:b,answers:{}}];current=0;loadQ();closePanel();}
loadQ();robots();
</script>
</body>
</html>
