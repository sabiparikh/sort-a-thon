<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sort-a-thon</title>
<style>
body{background:#000;color:#fff;font-family:Arial;text-align:center}
.bucket, .option{border:2px solid #fff;padding:10px;margin:10px;display:inline-block;min-width:150px}
.option{cursor:grab}
.grey{background:#777}
#gameOver{position:fixed;top:0;left:-100%;width:100%;height:100%;background:#000;color:red;font-size:60px;display:flex;justify-content:center;align-items:center;transition:1s;pointer-events:none;z-index:1}

.bar{height:100%;width:0;background:lime}
button{font-size:22px;margin:10px;position:relative;z-index:2}
</style>
</head>
<body>
<h1 id="levelTitle">Level 1</h1>

<div id="question"></div>
<div id="options"></div>
<div id="buckets"></div>
<br>


<br>
<button onclick="resetGame()">Play Again</button>
<div id="gameOver">GAME OVER</div>

<script>
var levels=[{questions:[{q:"Sort the following animals into the groups - Animals: Snakes Crocodiles Frogs Newts Lizards Salamanders",buckets:{Reptiles:["Snakes","Crocodiles","Lizards"],Amphibians:["Frogs","Newts","Salamanders"]}},{q:"Sort the Numbers in these buckets - Numbers: 3 6 6 9 3000 15111 18 18 3000",buckets:{"Multiples of 2":["6","6","18","18","3000","3000"],"Multiples of 3":["3","6","6","9","18","18","3000","3000","15111"]}},{q:"Sort the birds in the buckets Birds: Myna Pond Heron Indian Robin Red Whiskered Bulbul Cattle Egret Common Iora",buckets:{"Short birds":["Myna","Indian Robin","Red Whiskered Bulbul","Common Iora"],"Tall birds":["Pond Heron","Cattle Egret"]}}]},{questions:[{q:"Sort the plants into the buckets Plants: Chrysanthemum Ashoka Tomato Mango Money plant Aloevera",buckets:{Trees:["Ashoka","Mango"],Plants:["Chrysanthemum","Tomato","Money plant","Aloevera"]}},{q:"Sort the following games / activities in a venn diagram Games: Chess Battleship Cricket Javelin throwing Scrabble Badminton Football",buckets:{"Indoor games":["Chess","Battleship","Scrabble"],"Indoor & Outdoor":["Badminton"],"Outdoor games":["Cricket","Football","Javelin throwing"]}},{q:"Sort the following numbers - 2 4 3 5 7 21 18 11",buckets:{"Prime Numbers":["2","3","5","7","11"],"Composite Numbers":["4","21","18"]}}]},{questions:[{q:"Find the group it belongs to",buckets:{"Living Things":["Dog","Plant","Apple","Bird","Baby sister","Black Kite"],Vehicles:["Airplane","Car","bus","Auto"],"None of the above":["Robot","Eraser","Notebook","Pen","Laptop","Shovel","Bottle","the Sun","The moon"]}},{q:"Find the correct rule",buckets:{Flying:["Airplane","bird","helicopter","jet","sunbird"]}},{q:"Find the group it belongs to",buckets:{"Man - made things":["Bowl","Robot","Laptop"],"Natural things":["Turtle","Mountain","Birds","Amphibians"],Places:["Farm","Hospital","School","Mango grove"]}}]}];

var level=0,qIndex=0,placements={},usedMulti={};
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
for(var i=0;i<levels.length;i++){shuffle(levels[i].questions);} 

function render(){
 if(level>=levels.length){document.body.innerHTML='<h1>You Win</h1>';return;}
 var q=levels[level].questions[qIndex];
 document.getElementById('levelTitle').innerHTML='Level '+(level+1);
 document.getElementById('question').innerHTML=q.q;

 var opts=[];
 for(var k in q.buckets){opts=opts.concat(q.buckets[k]);}
 opts=[...new Set(opts)];
 var optDiv=document.getElementById('options');
 optDiv.innerHTML='';
 opts.forEach(function(o){
   var d=document.createElement('div');
   d.className='option';
   d.draggable=true;
   d.innerHTML=o;
   d.ondragstart=function(e){e.dataTransfer.setData('text',o);};
   optDiv.appendChild(d);
 });

 var buckDiv=document.getElementById('buckets');
 buckDiv.innerHTML='';
 for(var b in q.buckets){
   (function(bucket){
     var d=document.createElement('div');
     d.className='bucket';
     d.innerHTML=bucket;
     d.ondragover=function(e){e.preventDefault();};
     d.ondrop=function(e){
       var val=e.dataTransfer.getData('text');
       var correctBuckets=[];
       for(var key in q.buckets){if(q.buckets[key].indexOf(val)>-1)correctBuckets.push(key);} 
       if(correctBuckets.indexOf(bucket)===-1){gameOver();return;} 
       if(correctBuckets.length>1 && !usedMulti[val]){alert('Hmmm, dont you think that the option goes in more than one place?');usedMulti[val]=true;} 
       if(!placements[val]) placements[val]={};
       placements[val][bucket]=true;
       var el=[].slice.call(document.querySelectorAll('.option')).find(function(x){return x.innerHTML===val;});
       if(el) el.classList.add('grey');
       d.innerHTML+='<div>'+val+'</div>';
       checkComplete();
     };
     buckDiv.appendChild(d);
   })(b);
 }
}

function checkComplete(){
 var q=levels[level].questions[qIndex];
 for(var key in q.buckets){
   for(var i=0;i<q.buckets[key].length;i++){
     var v=q.buckets[key][i];
     var needed=0, placed=0;
     for(var k in q.buckets){if(q.buckets[k].indexOf(v)>-1)needed++;}
     if(placements[v]) placed=Object.keys(placements[v]).length;
     if(placed<needed) return;
   }
 }
 placements={};
 qIndex++;
 if(qIndex>=levels[level].questions.length){level++;qIndex=0;}
 render();
}

function gameOver(){
 document.getElementById('gameOver').style.left='0';
 var ops=document.querySelectorAll('.option');
 ops.forEach(function(o){o.draggable=false;});
}

function resetGame(){
 document.getElementById('gameOver').style.left='-100%';
 level=0; qIndex=0; placements={}; usedMulti={};
 for(var i=0;i<levels.length;i++){shuffle(levels[i].questions);} 
 render();
}

render();
</script>
</body>
</html>
