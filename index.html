<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sort-a-thon</title>
<style>
body{font-family:Arial;background:#cfe9ff;text-align:center}
h1{font-size:48px;margin:10px}
.container{display:flex;justify-content:center;gap:40px;margin-top:10px}
.bucket{width:240px;min-height:180px;border:3px dashed #333;border-radius:15px;padding:10px;background:#fff}
.option{display:inline-block;margin:6px;padding:8px 12px;background:#fff;border:2px solid #333;border-radius:10px;cursor:grab;font-weight:bold}
.grey{background:#bbb !important}
.progressWrap{width:70%;margin:5px auto}
.bar{height:22px;background:#eee;border-radius:20px;overflow:hidden}
.fill{height:100%;width:0;background:linear-gradient(90deg,#ff8,#f88,#8ff);transition:width .4s}
button{font-size:22px;margin:10px;padding:10px 20px;border-radius:10px}
#skull{font-size:80px;color:red}
canvas{position:fixed;pointer-events:none;top:0;left:0}
</style>
</head>
<body>
<button onclick="pauseGame()">Pause Game</button>
<button onclick="resumeGame()">Continue Game</button>
<h1 id="levelTitle">Level 1</h1>

<div class="progressWrap">
<b>Robot 1</b><div class="bar"><div id="r1" class="fill"></div></div>
<b>Robot 2</b><div class="bar"><div id="r2" class="fill"></div></div>
<b>YOU</b><div class="bar"><div id="you" class="fill"></div></div>
</div>

<div id="options"></div>
<div class="container">
<div id="bucketA" class="bucket"></div>
<div id="bucketB" class="bucket"></div>
</div>
<div id="skull"></div>
<button onclick="startGame()">Play Again</button>
<canvas id="fx"></canvas>

<script>
// QUESTIONS WITH DUPLICATES PRESERVED
const levels=[
[
{A:"Reptiles",B:"Amphibians",
options:["Snakes","Crocodiles","Frogs","Newts","Lizards","Salamanders"],
ans:{Snakes:["A"],Crocodiles:["A"],Frogs:["B"],Newts:["B"],Lizards:["A"],Salamanders:["B"]}},

{A:"Multiples of 2",B:"Multiples of 3",
options:["3","6","6","9","3000","15111","18","18","3000"],
ans:{3:["B"],6:["A","B"],9:["B"],3000:["A","B"],15111:["B"],18:["A","B"]}},

{A:"Short birds",B:"Tall birds",
options:["Myna","Pond Heron","Indian Robin","Red Whiskered Bulbul","Cattle Egret","Common Iora"],
ans:{Myna:["A"],"Pond Heron":["B"],"Indian Robin":["A"],"Red Whiskered Bulbul":["A"],"Cattle Egret":["B"],"Common Iora":["A"]}}
]
];

let level=0,qIndex=0,paused=false;let robotTimer=null;
let robot1=0,robot2=0,totalLevelItems=0,placedItems=0;

function countLevelItems(){totalLevelItems=0;levels[level].forEach(q=>totalLevelItems+=q.options.length)}
function shuffle(arr){return arr.sort(()=>Math.random()-0.5)}

function startGame(){paused=false;skull.innerHTML='';level=0;qIndex=0;robot1=robot2=0;placedItems=0;countLevelItems();nextQuestion();updateBars();if(robotTimer)clearInterval(robotTimer);robotsMove();}

function nextQuestion(){levelTitle.innerText="Level "+(level+1);let data=levels[level][qIndex];bucketA.innerHTML="<b>"+data.A+"</b>";bucketB.innerHTML="<b>"+data.B+"</b>";options.innerHTML="";shuffle([...data.options]).forEach((k,i)=>{let d=document.createElement('div');d.className='option';d.draggable=true;d.innerText=k;d.dataset.id=i;d.ondragstart=e=>e.dataTransfer.setData('text',i);options.appendChild(d);});}

function dropHandler(bucket,e){if(paused)return;let id=e.dataTransfer.getData('text');let el=[...document.querySelectorAll('.option')].find(o=>o.dataset.id==id);if(!el||el.classList.contains('grey'))return;let item=el.innerText;let data=levels[level][qIndex].ans[item];let letter=bucket==='bucketA'?'A':'B';if(!data.includes(letter)){gameOver();return;}el.classList.add('grey');document.getElementById(bucket).appendChild(el);placedItems++;updateBars();confetti();
if([...document.querySelectorAll('.option')].every(o=>o.classList.contains('grey'))){qIndex++;if(qIndex<levels[level].length)nextQuestion();}}

['bucketA','bucketB'].forEach(id=>{window[id].ondragover=e=>e.preventDefault();window[id].ondrop=e=>dropHandler(id,e);});
function robotsMove(){robotTimer=setInterval(()=>{if(paused)return;robot1+=Math.random()*2.5+1;robot2+=Math.random()*2.5+1;updateBars();if(robot1>=100||robot2>=100){gameOver();paused=true;}},600);} 
function updateBars(){r1.style.width=Math.min(robot1,100)+'%';r2.style.width=Math.min(robot2,100)+'%';you.style.width=(placedItems/totalLevelItems*100)+'%';}
function gameOver(){skull.innerHTML='☠️ GAME OVER';paused=true;}
function pauseGame(){paused=true}function resumeGame(){paused=false}

let c=document.getElementById('fx'),ctx=c.getContext('2d');c.width=innerWidth;c.height=innerHeight;let pieces=[];function confetti(){for(let i=0;i<80;i++)pieces.push({x:Math.random()*c.width,y:0,s:Math.random()*6+4,v:Math.random()*3+2});}
setInterval(()=>{ctx.clearRect(0,0,c.width,c.height);pieces.forEach(p=>{p.y+=p.v;ctx.fillStyle='hsl('+Math.random()*360+',80%,60%)';ctx.fillRect(p.x,p.y,p.s,p.s)});},30);

startGame();
</script>
</body>
</html>
